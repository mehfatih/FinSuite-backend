# ============================================================
# Zyrix FinSuite Backend - Nixpacks override
#
# Goal: keep deploy time low (~2-3 min) by stopping Nixpacks from
# auto-installing chromium + 12 GUI libs via apt.
#
# Sprint D-2: PDF service uses puppeteer-core + @sparticuz/chromium
# (self-contained Chromium + libs bundled). The legacy invoice PDF
# controller still uses bundled puppeteer; both coexist via the
# cross-platform launcher in src/services/pdf/pdfRenderer.ts.
# ============================================================

[phases.setup]
nixPkgs = ["nodejs_20", "npm-9_x", "openssl"]
aptPkgs = []

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm install && npx prisma generate"]

[start]
cmd = "npx tsx src/index.ts"

[variables]
PUPPETEER_SKIP_DOWNLOAD = "false"
