# ============================================================
# Zyrix FinSuite Backend — Nixpacks override
#
# Sprint D-2 update: re-add the system shared libraries that
# Puppeteer's bundled Chromium needs at runtime. The previous
# config (`aptPkgs = []`) cut deploy time but produced a Chromium
# that crashed on launch with `libglib-2.0.so.0: cannot open
# shared object file`. The libs below are exactly the runtime
# dependencies — we still skip the full `chromium` apt package
# because Puppeteer ships its own browser binary via npm install.
#
# Trade-off: deploy ~+1-2 min vs. pre-D-2; still well under the
# original 17-min auto-detect path.
# ============================================================

[phases.setup]
nixPkgs = ["nodejs_20", "npm-9_x", "openssl"]
aptPkgs = [
  "ca-certificates",
  "fonts-liberation",
  "libasound2",
  "libatk-bridge2.0-0",
  "libatk1.0-0",
  "libc6",
  "libcairo2",
  "libcups2",
  "libdbus-1-3",
  "libexpat1",
  "libfontconfig1",
  "libgbm1",
  "libgcc1",
  "libglib2.0-0",
  "libgtk-3-0",
  "libnspr4",
  "libnss3",
  "libpango-1.0-0",
  "libpangocairo-1.0-0",
  "libstdc++6",
  "libx11-6",
  "libx11-xcb1",
  "libxcb1",
  "libxcomposite1",
  "libxcursor1",
  "libxdamage1",
  "libxext6",
  "libxfixes3",
  "libxi6",
  "libxrandr2",
  "libxrender1",
  "libxshmfence1",
  "libxss1",
  "libxtst6",
  "lsb-release",
  "wget",
  "xdg-utils"
]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node dist/index.js"

[variables]
# Puppeteer ships its own Chromium via npm install; we just provide
# the system .so libraries it needs.
PUPPETEER_SKIP_DOWNLOAD = "false"
