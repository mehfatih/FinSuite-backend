# ============================================================
# Zyrix FinSuite Backend — Nixpacks override
#
# Sprint D-2 update: re-add the system shared libraries that
# Puppeteer's bundled Chromium needs at runtime. The previous
# `aptPkgs = []` config (set to cut deploy time) produced a
# Chromium that crashed on launch with `libglib-2.0.so.0:
# cannot open shared object file`.
#
# We tried `aptPkgs = [...]` first; Nixpacks 1.41 silently
# skipped the list when nixPkgs was also customised. Explicit
# `apt-get install` in the install phase is reliable.
# Trade-off: deploy ~+1-2 min vs. pre-D-2; still far below
# the original 17-min auto-detect path.
# ============================================================

[phases.setup]
nixPkgs = ["nodejs_20", "npm-9_x", "openssl"]

[phases.install]
cmds = [
  "apt-get update -y && DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends ca-certificates fonts-liberation libasound2 libatk-bridge2.0-0 libatk1.0-0 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgbm1 libglib2.0-0 libgtk-3-0 libnspr4 libnss3 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 libxrender1 libxshmfence1 libxss1 libxtst6 lsb-release xdg-utils && rm -rf /var/lib/apt/lists/*",
  "npm ci"
]

[phases.build]
cmds = ["npm install && npx prisma generate"]

[start]
cmd = "npx tsx src/index.ts"

[variables]
PUPPETEER_SKIP_DOWNLOAD = "false"
